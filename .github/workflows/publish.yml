name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/alteriom-webhook-client
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
